services:
  libre-mainnet:
    build:
      context: .
      dockerfile: Dockerfile
    image: libre-node:5.0.3
    container_name: libre-mainnet-api
    command: >
      nodeos
      --config-dir /opt/eosio/config
      --data-dir /opt/eosio/data
      --genesis-json /opt/eosio/config/genesis.json
    ports:
      - "9888:9888"
      - "9876:9876"
      - "9080:9080"
    volumes:
      - ./mainnet/config:/opt/eosio/config
      - ./mainnet/data:/opt/eosio/data
      - ./mainnet/logs:/opt/eosio/logs
    networks:
      - libre-network
    restart: unless-stopped

  libre-testnet:
    build:
      context: .
      dockerfile: Dockerfile
    image: libre-node:5.0.3
    container_name: libre-testnet-api
    command: >
      nodeos
      --config-dir /opt/eosio/config
      --data-dir /opt/eosio/data
      --genesis-json /opt/eosio/config/genesis.json
    ports:
      - "9889:9889"
      - "9877:9877"
      - "9081:9081"
    volumes:
      - ./testnet/config:/opt/eosio/config
      - ./testnet/data:/opt/eosio/data
      - ./testnet/logs:/opt/eosio/logs
    networks:
      - libre-network
    restart: unless-stopped

networks:
  libre-network:
    driver: bridge
