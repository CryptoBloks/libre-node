# Snapshot Provider Configuration
# This file defines available snapshot providers for Libre blockchain

# Format: PROVIDER_NAME|BASE_URL|PATH_PATTERN|FILE_PATTERN|COMPRESSION
# - PROVIDER_NAME: Unique identifier for the provider
# - BASE_URL: Base URL for the snapshot service
# - PATH_PATTERN: Path pattern (use {network} for mainnet/testnet substitution)
# - FILE_PATTERN: Regex pattern to match snapshot files
# - COMPRESSION: File compression type (zst, gz, bz2, xz, none)

# EOSUSA (Default)
EOSUSA_MAINNET|https://snapshots.eosusa.io|/snapshots/libre|.*\.bin\.zst$|zst
EOSUSA_TESTNET|https://snapshots.eosusa.io|/snapshots/libretestnet|.*\.bin\.zst$|zst

# EOS Nation (Example - adjust URLs as needed)
#EOSNATION_MAINNET|https://snapshots.eosnation.io|/libre-mainnet|.*\.bin\.gz$|gz
#EOSNATION_TESTNET|https://snapshots.eosnation.io|/libre-testnet|.*\.bin\.gz$|gz

# EOSphere (Example - adjust URLs as needed)
#EOSPHERE_MAINNET|https://snapshots.eosphere.io|/libre|libre.*\.tar\.gz$|gz
#EOSPHERE_TESTNET|https://snapshots.eosphere.io|/libre-testnet|libre.*\.tar\.gz$|gz

# Cryptobloks (Example - adjust URLs as needed)
#CRYPTOBLOKS_MAINNET|https://snapshots.cryptobloks.io|/libre/mainnet|.*\.bin\.zst$|zst
#CRYPTOBLOKS_TESTNET|https://snapshots.cryptobloks.io|/libre/testnet|.*\.bin\.zst$|zst

# BP Snapshots (Example - adjust URLs as needed)
#BPSNAPSHOTS_MAINNET|https://snapshots.libre.blockproducers.com|/mainnet|.*snapshot.*\.bin\.zst$|zst
#BPSNAPSHOTS_TESTNET|https://snapshots.libre.blockproducers.com|/testnet|.*snapshot.*\.bin\.zst$|zst

# Custom Provider Template
#CUSTOM_MAINNET|https://your-provider.com|/path/to/mainnet|.*\.bin\.(zst|gz)$|zst
#CUSTOM_TESTNET|https://your-provider.com|/path/to/testnet|.*\.bin\.(zst|gz)$|zst

