# Snapshot Provider Configuration
# This file defines available snapshot providers for Libre blockchain

# Format: PROVIDER_NAME|BASE_URL|PATH_PATTERN|FILE_PATTERN|COMPRESSION
# - PROVIDER_NAME: Unique identifier for the provider
# - BASE_URL: Base URL for the snapshot service
# - PATH_PATTERN: Path pattern for the specific network
# - FILE_PATTERN: Regex pattern to match snapshot files
# - COMPRESSION: File compression type (zst, gz, bz2, xz, none)

# EOSUSA (Default Provider)
# Uses direct download URLs for latest snapshots
EOSUSA_MAINNET|https://snapshots.eosusa.io/snapshots/libre/latest.zst|DIRECT|DIRECT|zst
EOSUSA_TESTNET|https://snapshots.eosusa.io/snapshots/libretestnet/latest.zst|DIRECT|DIRECT|zst

# Add additional providers below using the same format:
# PROVIDER_MAINNET|https://your-snapshots.com|/path/to/mainnet|.*\.bin\.zst$|zst
# PROVIDER_TESTNET|https://your-snapshots.com|/path/to/testnet|.*\.bin\.zst$|zst
#
# Supported compression formats: zst, gz, bz2, xz, none
# 
# Example custom provider:
# CUSTOM_MAINNET|https://snapshots.example.com|/libre-mainnet|.*\.bin\.gz$|gz
# CUSTOM_TESTNET|https://snapshots.example.com|/libre-testnet|.*\.bin\.gz$|gz