# Libre Mainnet API Node Configuration

# Chain Configuration
# chain-id is specified via command line or genesis.json

# HTTP and P2P Configuration
http-server-address = 0.0.0.0:9888
p2p-listen-endpoint = 0.0.0.0:9876

# Plugin Configuration - Required
plugin = eosio::chain_plugin
plugin = eosio::chain_api_plugin
plugin = eosio::http_plugin
plugin = eosio::net_plugin

# State History Plugin - Optional
plugin = eosio::state_history_plugin

# Producer API Plugin - Optional
# Block /v1/producer from public access if enabled
#plugin = eosio::producer_api_plugin

# Producer Plugin - For block production (disabled by default)
#plugin = eosio::producer_plugin

# State History Configuration
state-history-endpoint = 0.0.0.0:9080
trace-history = true
chain-state-history = true
state-history-dir = /opt/eosio/data/state-history


# Enable Account Queries - Optional
enable-account-queries = true

# Pause on Startup - Safety Measure to prevent node from producing blocks if misconfigured
pause-on-startup = true

# Chain Configuration
chain-state-db-size-mb = 32768
# reversible-blocks-db-size-mb = 2048  # Not supported in Leap v5.0.3
# max-irreversible-block-age = -1  # Default value, commented to avoid warning

# Logging Configuration
contracts-console = true
verbose-http-errors = true

# Performance Settings
max-transaction-time = 1000
abi-serializer-max-time-ms = 12500
chain-threads = 4
http-threads = 6

# P2P Configuration
max-clients = 200
# connection-cleanup-period = 30  # Default value, commented to avoid warning
# net-threads = 4  # Default value, commented to avoid warning
p2p-max-nodes-per-host = 10
agent-name = "Libre Mainnet API Node"
sync-fetch-span = 10000

# Access Control
access-control-allow-origin = *
access-control-allow-headers = *
http-validate-host = false

# Resource Limits
http-max-response-time-ms = 12500
# http-max-bytes-in-flight-mb = 500  # Default value, commented to avoid warning

## Stride Configuration

# Retained Blocks Stride
blocks-log-stride = 250000
blocks-retained-dir = retained
#max-retained-block-files =

# Retained State History Stride
state-history-stride = 250000
state-history-retained-dir = retained

# Trace API Stride
trace-slice-stride = 250000

# Libre Mainnet P2P Peers
p2p-peer-address = p2p.libre.iad.cryptobloks.io:9876
p2p-peer-address = p2p.libre.pdx.cryptobloks.io:9876

## Producer Configuration (Disabled by default for security)
# WARNING: Only enable producer mode if you are an authorized block producer
# Remove pause-on-startup and configure the following settings to enable production

# Producer Name - Set to your registered producer account
#producer-name = yourproducername

# Private Key for Block Signing
# SECURITY: Use signature-provider instead of private-key for production
# private-key = YOUR_PRIVATE_KEY_HERE

# Signature Provider (Recommended for production)
# signature-provider = YOUR_PUBLIC_KEY=KEY:YOUR_PRIVATE_KEY

# Enable Block Production (disabled by default)
#enable-stale-production = false

# Producer Configuration
#max-transaction-time = 30
#max-irreversible-block-age = 10
#producer-threads = 2

# Disable API access in producer mode for security
#http-server-address = 127.0.0.1:9888  # Localhost only for producers

# CPU Usage Limits for Producer Mode
#max-scheduled-transaction-time-per-block-ms = 100
#subjective-cpu-leeway-us = 31000
#incoming-defer-ratio = 1.0

# Additional P2P settings for producers
#p2p-accept-transactions = false  # Don't accept transactions from P2P
#api-accept-transactions = true   # Accept transactions from API only

## Lightweight Producer Mode (Snapshot-based)
# Enable these settings for minimal resource usage with snapshot loading
# Run ./scripts/producer-snapshot.sh to download latest snapshot first

# Snapshot-based startup (uncomment for lightweight mode)
#snapshot = /opt/eosio/data/snapshot.bin

# Minimal block retention (lightweight mode)
#blocks-log-stride = 1000            # Keep only last 1000 blocks
#max-retained-block-files = 1        # Single block log file
#blocks-retained-dir =               # No block retention directory

# Memory-optimized settings (lightweight mode)
#chain-state-db-size-mb = 4096       # 4GB instead of 32GB
#reversible-blocks-db-size-mb = 340  # Minimum reversible blocks
#eos-vm-oc-cache-size-mb = 512       # Reduced cache size

# Fast sync options (lightweight mode)
#read-mode = head                    # Only maintain head state
#validation-mode = light             # Light validation
#database-map-mode = mapped          # Memory-mapped files