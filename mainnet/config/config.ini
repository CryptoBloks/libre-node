# Libre Mainnet API Node Configuration

# Chain Configuration
# chain-id is specified via command line or genesis.json

# HTTP and P2P Configuration
http-server-address = 0.0.0.0:9888
p2p-listen-endpoint = 0.0.0.0:9876

# Plugin Configuration - Required
plugin = eosio::chain_plugin
plugin = eosio::chain_api_plugin
plugin = eosio::http_plugin
plugin = eosio::net_plugin

# State History Plugin - Optional
plugin = eosio::state_history_plugin

# Producer API Plugin - Optional
# Block /v1/producer from public access if enabled
#plugin = eosio::producer_api_plugin

# State History Configuration
state-history-endpoint = 0.0.0.0:9080
trace-history = true
chain-state-history = true
state-history-dir = /opt/eosio/data/state-history


# Enable Account Queries - Optional
enable-account-queries = true

# Pause on Startup - Safety Measure to prevent node from producing blocks if misconfigured
pause-on-startup = true

# Chain Configuration
chain-state-db-size-mb = 32768
# reversible-blocks-db-size-mb = 2048  # Not supported in Leap v5.0.3
# max-irreversible-block-age = -1  # Default value, commented to avoid warning

# Logging Configuration
contracts-console = true
verbose-http-errors = true

# Performance Settings
max-transaction-time = 1000
abi-serializer-max-time-ms = 12500
chain-threads = 4
http-threads = 6

# P2P Configuration
max-clients = 200
# connection-cleanup-period = 30  # Default value, commented to avoid warning
# net-threads = 4  # Default value, commented to avoid warning
p2p-max-nodes-per-host = 10
agent-name = "Libre Mainnet API Node"
sync-fetch-span = 10000

# Access Control
access-control-allow-origin = *
access-control-allow-headers = *
http-validate-host = false

# Resource Limits
http-max-response-time-ms = 12500
# http-max-bytes-in-flight-mb = 500  # Default value, commented to avoid warning

## Stride Configuration

# Retained Blocks Stride
blocks-log-stride = 250000
blocks-retained-dir = retained
#max-retained-block-files =

# Retained State History Stride
state-history-stride = 250000
state-history-retained-dir = retained

# Trace API Stride
trace-slice-stride = 250000

# Libre Mainnet P2P Peers
p2p-peer-address = p2p.libre.iad.cryptobloks.io:9876
p2p-peer-address = p2p.libre.pdx.cryptobloks.io:9876